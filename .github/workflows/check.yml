name: Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node:
          - "22.23.1"
          - "24.18.0"
          - "26.5.0"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.7.5
          install: false
          cache: true
      - run: mise x node@${{ matrix.node }} -- npm ci --ignore-scripts
      - run: mise x node@${{ matrix.node }} -- npm run setup:effect
      - run: mise x node@${{ matrix.node }} -- npm run check
